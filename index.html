<input id="search" placeholder="Search YouTube">
<button onclick="go()">Search</button>

<div id="results"></div>

<script>
const API = "https://invidious.lunar.icu/api/v1";

async function go() {
  let q = document.getElementById("search").value;
  let res = await fetch(`${API}/search?q=${encodeURIComponent(q)}`);
  let data = await res.json();

  let html = "";
  data.forEach(v => {
    html += `
      <div>
        <img src="${v.thumbnail}" width="200">
        <p>${v.title}</p>
        <button onclick="play('${v.videoId}')">Play</button>
      </div>
    `;
  });

  document.getElementById("results").innerHTML = html;
}

async function play(id) {
  let res = await fetch(`${API}/videos/${id}`);
  let data = await res.json();

  let stream = data.formatStreams[0].url;

  document.body.innerHTML = `
    <video controls autoplay width="800" src="${stream}"></video>
  `;
}
</script>
